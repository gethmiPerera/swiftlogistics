name: Docker - build images

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  compose-build:
    name: Validate Docker Compose build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Validate compose syntax
        run: docker compose config

      - name: Build all service images
        run: docker compose build

      - name: Start dependency services
        run: docker compose up -d eureka rabbitmq postgres

      - name: Start application services
        run: docker compose up -d cms-soap ros-rest wms-tcp swifttrack-core

      - name: Wait for SwiftTrack Core health
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8080/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color swifttrack-core
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose down --volumes
