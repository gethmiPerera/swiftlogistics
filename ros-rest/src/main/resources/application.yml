server:
  port: 8082

spring:
  application:
    name: ros-rest

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: false
    hostname: ros-rest

ros:
  failRate: ${ROS_FAIL_RATE:0.0}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always