<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>SwiftTrack - Client Portal</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; }
    input, button { padding: 8px; margin: 4px 0; width: 100%; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    #log { border: 1px solid #ddd; padding: 12px; height: 320px; overflow: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
<h2>SwiftTrack - Order Submit (Demo)</h2>

<div class="row">
  <div>
    <label>Client ID</label>
    <input id="clientId" value="client-001"/>
  </div>
  <div>
    <label>Priority</label>
    <input id="priority" value="NORMAL"/>
  </div>
</div>

<label>Pickup Address</label>
<input id="pickup" value="Colombo 07"/>

<label>Drop Address</label>
<input id="drop" value="Kandy City"/>

<button onclick="submitOrder()">Submit Order</button>

<h3>Real-time Status Feed</h3>
<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
  const log = (msg) => {
    const el = document.getElementById('log');
    el.textContent += msg + "\n";
    el.scrollTop = el.scrollHeight;
  };

  // WebSocket subscribe
  const sock = new SockJS('/ws');
  const stomp = Stomp.over(sock);
  stomp.debug = null;

  stomp.connect({}, () => {
    log("Connected to live updates.");
    stomp.subscribe('/topic/orders', (m) => {
      const data = JSON.parse(m.body);
      log(`[${new Date(data.ts).toLocaleTimeString()}] Order ${data.orderId}: ${data.status} - ${data.note}`);
    });
  });

  async function submitOrder() {
    const payload = {
      clientId: document.getElementById('clientId').value,
      pickupAddress: document.getElementById('pickup').value,
      dropAddress: document.getElementById('drop').value,
      priority: document.getElementById('priority').value
    };

    const res = await fetch('/api/orders', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const body = await res.json();
    log(`Submitted. HTTP ${res.status}. orderId=${body.orderId}, status=${body.status}`);
  }
</script>
</body>
</html>
