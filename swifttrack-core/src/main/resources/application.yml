server:
  port: 8080

spring:
  application:
    name: swifttrack-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/swifttrack}
    username: ${SPRING_DATASOURCE_USERNAME:swift}
    password: ${SPRING_DATASOURCE_PASSWORD:swift}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    username: guest
    password: guest

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

swift:
  wms:
    host: ${WMS_HOST:localhost}
    port: ${WMS_PORT:9099}

logging:
  level:
    org.springframework: INFO