<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Shipment – SwiftTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="track">

    <!-- STANDALONE TRACKING PAGE (Public-facing page – no login required) -->

    <div class="track-wrapper">

        <!-- Top bar -->
        <header class="track-header">
            <a href="index.html" class="logo">Swift<span>Track</span></a>
            <a href="index.html" class="btn btn-ghost btn-sm">&larr; Home</a>
        </header>

        <!-- Search + results area -->
        <div class="track-body">
            <div class="track-card">
                <h2>Track Your Shipment</h2>
                <p class="track-subtitle">Enter your Order ID to see real-time updates from CMS, ROS and WMS systems.
                </p>

                <div class="track-search">
                    <input type="text" id="inp-trackId-page" placeholder="e.g. SL-1001">
                    <button class="btn btn-primary" id="btn-track-page">Track</button>
                </div>

                <!-- Results rendered here by TrackApp -->
                <div id="track-result"></div>
            </div>
        </div>

        <footer class="track-footer">
            &copy; 2026 SwiftLogistics (Pvt) Ltd &mdash; Middleware Architecture Assignment
        </footer>

    </div>

    <!-- Demo toolbar -->
    <div class="demo-toolbar">
        <span>🧪 Demo:</span>
        <button class="btn btn-warning btn-sm" id="btn-demo-event">⚡ Trigger Event</button>
    </div>

    <!-- STOMP / SockJS for real-time WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
